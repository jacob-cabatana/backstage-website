<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Backstage Fast Lane • Sign Up</title>

  <style>
    :root {
      --bg:#000;
      --card:#0b0b0b;
      --border:#1f1f1f;
      --text:#fff;
      --muted:#a7a7a7;
      --accent:#3b82f6;
      --purple:#9c4ff2;
    }

    * { 
      box-sizing: border-box; 
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 460px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 0 18px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(156,79,242,.12);
      border: 1px solid rgba(156,79,242,.25);
      color: #d8c1ff;
      font-size: 12px;
      font-weight: 700;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59,130,246,.18);
    }

    select {
      appearance: none;
      cursor: pointer;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.15);
      background: linear-gradient(135deg, #9c4ff2, #225cda);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(239,68,68,.35);
      background: rgba(239,68,68,.08);
      color: #ffd4d4;
      font-size: 13px;
      line-height: 1.4;
    }

    .login-link {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: #a7a7a7;
    }

    .login-link a {
      color: #ffffff;
      text-decoration: underline;
      cursor: pointer;
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,.48);
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="badge">Backstage Fast Lane</div>

    <h1>Create your bar dashboard</h1>
    <p>
      Set up your venue profile, add drinks, connect payouts, and start accepting drink orders.
    </p>

    <div class="card">
      <form id="signupForm">
        <label for="managerName">Manager name</label>
        <input 
          id="managerName" 
          type="text" 
          placeholder="Jay Cabatana" 
          required 
        />

        <label for="email">Email</label>
        <input 
          id="email" 
          type="email" 
          placeholder="you@venue.com" 
          required 
        />

        <label for="phone">Phone number</label>
        <input 
          id="phone" 
          type="tel" 
          placeholder="904 555 1234" 
          required 
        />

        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          placeholder="••••••••" 
          minlength="8" 
          required 
        />

        <label for="venueName">Venue name</label>
        <input 
          id="venueName" 
          type="text" 
          placeholder="Surfer The Bar" 
          required 
        />

        <label for="venueAddress">Venue address</label>
        <input 
          id="venueAddress" 
          type="text" 
          placeholder="200 1st St N, Jacksonville Beach, FL" 
          required 
        />

        <label for="venueType">Venue type</label>
        <select id="venueType" required>
          <option value="">Choose one</option>
          <option value="bar">Bar</option>
          <option value="club">Club</option>
          <option value="lounge">Lounge</option>
          <option value="restaurant_bar">Restaurant Bar</option>
          <option value="event_venue">Event Venue</option>
        </select>

        <button id="submitBtn" type="submit">Create account</button>

        <div class="error" id="errorBox"></div>

        <div class="note">
          Your venue will not appear in the app until your setup checklist is complete.
        </div>
      </form>
    </div>

    <div class="login-link">
      Already hosting?
      <a href="/login.html">Log in</a>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "/js/firebase.js";

    import { 
      createUserWithEmailAndPassword 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import { 
      doc, 
      setDoc, 
      serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const form = document.getElementById("signupForm");
    const btn = document.getElementById("submitBtn");
    const errorBox = document.getElementById("errorBox");

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    function clearError() {
      errorBox.textContent = "";
      errorBox.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();

      const managerName = document.getElementById("managerName").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value;
      const venueName = document.getElementById("venueName").value.trim();
      const venueAddress = document.getElementById("venueAddress").value.trim();
      const venueType = document.getElementById("venueType").value;

      if (!managerName || !email || !phone || !password || !venueName || !venueAddress || !venueType) {
        showError("All fields are required.");
        return;
      }

      if (password.length < 8) {
        showError("Password must be at least 8 characters.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Creating...";

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const user = cred.user;

        await setDoc(doc(db, "businessUsers", user.uid), {
          uid: user.uid,
          email: user.email,
          phone: phone,
          managerName: managerName,

          role: "bar_owner",
          accountType: "venue",

          stripeAccountId: null,

          payouts: {
            connected: false,
            last4: null,
            status: "not_started"
          },

          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        await setDoc(doc(db, "venues", user.uid), {
          id: user.uid,
          ownerUid: user.uid,

          venueName: venueName,
          venueAddress: venueAddress,
          venueType: venueType,

          venuePhotoUrl: "",
          shortDescription: "",
          pickupInstructions: "",

          address: {
            full: venueAddress,
            latitude: null,
            longitude: null,
            geohash: null
          },

          contact: {
            managerName: managerName,
            email: user.email,
            phone: phone
          },

          fastLaneEnabled: false,
          acceptingOrders: false,

          setup: {
            profileComplete: false,
            payoutsReady: false,
            menuReady: false,
            pickupReady: false
          },

          stats: {
            drinksCount: 0,
            totalOrders: 0
          },

          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        window.location.href = "/dashboard.html";

      } catch (err) {
        showError(err.message || "Signup failed.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Create account";
      }
    });
  </script>
</body>
</html>
