<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Event Details | Backstage</title>

  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --surface-2: #171717;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --muted-2: rgba(255, 255, 255, 0.48);
      --border: rgba(255, 255, 255, 0.10);
      --line: rgba(255, 255, 255, 0.08);
      --button: #f5f5f7;
      --button-text: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      overflow-x: hidden;
      background: #000;
    }

    html,
body {
  scrollbar-width: none;
  -ms-overflow-style: none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar {
  display: none;
}

    #event-detail {
      width: 100%;
      min-height: 100vh;
      background: #000;
      padding-bottom: calc(130px + env(safe-area-inset-bottom));
    }

.event-host-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0 0;
}

.host-avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  background: #111;
}

.host-avatar-ring {
  width: 38px;
  height: 38px;
  padding: 2px;
  border-radius: 50%;
  background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.event-host {
  margin: 0;
  color: rgba(255, 255, 255, 0.88);
  font-size: 17px;
  line-height: 1.3;
  font-weight: 550;
}

.event-date-line {
  margin: 10px 0 0;
  color: #a855f7;
  font-size: 16px;
  line-height: 1.35;
  font-weight: 600;
}

.info-icon-svg {
  width: 14px;
  height: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  opacity: 0.9;
  flex-shrink: 0;
}

.info-icon-svg svg {
  width: 14px;
  height: 14px;
  display: block;
  fill: #ffffff;
}

.detail-shell {
  width: 100%;
  max-width: 760px;
  min-height: 100vh;
  margin: 0 auto;
  background: #000;
  padding-top: 20px;
}

.detail-hero {
  width: 100%;
  aspect-ratio: 4 / 5;
  max-height: 540px;
  background: #000;
  border-radius: 28px;
  overflow: hidden;
}

.detail-image,
.detail-image-fallback {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: center;
  border-radius: 28px;
}

.detail-image-fallback {
  min-height: 260px;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10), transparent 30%),
    linear-gradient(135deg, #090909 0%, #161616 50%, #0a0a0a 100%);
}

    .detail-main {
      padding: 26px 24px 0;
    }

.event-title {
  color: #ffffff;
}

    .event-host {
      margin: 10px 0 0;
      color: rgba(255, 255, 255, 0.80);
      font-size: 15px;
      line-height: 1.3;
      font-weight: 500;
    }
.event-date-line {
  margin: 10px 0 0;
  color: var(--event-accent-color, #a855f7);
  font-size: 16px;
  line-height: 1.35;
  font-weight: 600;
}

    .quick-info {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin: 14px 0 30px;
    }

    .info-line {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 14px;
      line-height: 1.3;
      font-weight: 500;
    }

    .info-icon {
      opacity: 0.82;
      font-size: 13px;
    }

    .buy-panel {
      display: none;
    }

    .price-value {
      display: block;
      color: #fff;
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-caption {
      display: block;
      margin-top: 6px;
      color: var(--muted-2);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 500;
    }

.secure-ticket-button {
  width: 100%;
  min-height: 50px;
  border: 1.5px solid transparent;
  border-radius: 999px;
  background:
    linear-gradient(#000, #000) padding-box,
    linear-gradient(135deg, #a855f7 0%, #3b82f6 100%) border-box;
  color: #ffffff;
  font-size: 13px;
  font-weight: 750;
  letter-spacing: 0.01em;
  cursor: pointer;
  text-transform: none;
  transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
  box-shadow: 0 0 18px rgba(168, 85, 247, 0.22);
}

.secure-ticket-button:hover {
  opacity: 1;
  box-shadow: 0 0 24px rgba(59, 130, 246, 0.28);
}

    .secure-ticket-button:active {
      transform: scale(0.985);
    }

    .section {
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    .section-title {
      margin: 0 0 12px;
      color: #fff;
      font-size: 21px;
      font-weight: 500;
      letter-spacing: -0.03em;
    }

    .event-description {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      font-weight: 400;
      white-space: pre-wrap;
    }

    .empty-description {
      margin: 0;
      color: var(--muted-2);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 400;
    }

    .details-list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .details-list-row {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 10px;
      align-items: start;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      font-weight: 500;
    }

    .bottom-ticket-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 999;
      width: 100%;
      max-width: 760px;
      transform: translateX(-50%);

      padding: 14px 24px calc(14px + env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-top: 1px solid rgba(255, 255, 255, 0.10);

      display: grid;
      grid-template-columns: 1fr 170px;
      gap: 18px;
      align-items: center;
    }

    .bottom-ticket-bar .secure-ticket-button {
      min-height: 50px;
    }

    .state-card {
      width: calc(100% - 32px);
      max-width: 760px;
      margin: 28px auto;
      padding: 22px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }

    .state-card h3 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .state-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-weight: 500;
    }

.event-host-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0 0;
}

.host-avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  background: #111;
}


.event-host {
  margin: 0;
  color: rgba(255, 255, 255, 0.88);
  font-size: 17px;
  line-height: 1.3;
  font-weight: 550;
}

.event-date-line {
  margin: 10px 0 0;
  color: #a855f7;
  font-size: 16px;
  line-height: 1.35;
  font-weight: 600;
}

.quick-info {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin: 14px 0 30px;
}

.info-line {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: rgba(255, 255, 255, 0.82);
  font-size: 14px;
  line-height: 1.3;
  font-weight: 500;
}

.info-icon-svg {
  width: 14px;
  height: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  opacity: 0.9;
  flex-shrink: 0;
}

.info-icon-svg svg {
  width: 14px;
  height: 14px;
  display: block;
  fill: #ffffff;
}

@media (max-width: 700px) {
  .detail-shell {
    max-width: none;
    padding-top: 14px;
  }

  .detail-hero {
    margin: 0 12px;
    aspect-ratio: 4 / 5;
    max-height: none;
    border-radius: 24px;
  }

  .detail-image,
  .detail-image-fallback {
    border-radius: 24px;
  }

  .detail-main {
    padding: 22px 16px 0;
  }

  
}
  </style>
</head>

<body>
  <div id="event-detail"></div>
  <script type="module" src="assets/eventsDetail.js?v=5"></script>
</body>

</html>
