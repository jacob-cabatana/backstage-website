<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Event Details | Backstage</title>

  <style>

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f10;
      color: white;
    }

    #event-detail {
      max-width: 720px;
      margin: auto;
      padding: 20px;
    }

    .detail-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .detail-image {
      width: 100%;
      border-radius: 14px;
      object-fit: cover;
    }

    .detail-card {
      background: #1b1b1c;
      padding: 20px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-date {
      font-size: 18px;
      font-weight: 600;
    }

    .detail-price {
      font-size: 16px;
      opacity: 0.8;
    }

    .ticket-button {
      margin-top: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      background: #5c3cff;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .ticket-button:hover {
      opacity: 0.85;
    }

    .guestlist {
      margin-top: 10px;
      background: #1b1b1c;
      border-radius: 14px;
      padding: 20px;
    }

    .guestlist h3 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 18px;
      font-weight: 600;
    }

    .guest-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .guest-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.1);
    }

    .guest-name {
      font-size: 15px;
      font-weight: 500;
    }

  </style>

</head>

<body>

  <div id="event-detail"></div>

  <script type="module" src="assets/eventsDetail.js"></script>

</body>

</html>
