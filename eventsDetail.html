<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Event Details | Backstage</title>

<style>
  :root {
    --bg: #050507;
    --card: rgba(255, 255, 255, 0.055);
    --border: rgba(255, 255, 255, 0.10);
    --text: rgba(255, 255, 255, 0.94);
    --muted: rgba(255, 255, 255, 0.68);
    --soft: rgba(255, 255, 255, 0.08);
    --purple: #8b5cf6;
    --blue: #2563eb;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(520px 360px at 75% -10%, rgba(139, 92, 246, 0.38), transparent 65%),
      radial-gradient(460px 320px at 0% 85%, rgba(37, 99, 235, 0.20), transparent 62%),
      var(--bg);
    color: white;
  }

  #event-detail {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 22px;
  }

  .detail-container {
    position: relative;
    overflow: hidden;
    min-height: 250px;
    border-radius: 30px;
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.45), rgba(37, 99, 235, 0.26));
    border: 1px solid var(--border);
    box-shadow: 0 18px 36px rgba(0, 0, 0, 0.36);
  }

  .detail-container::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.08),
      rgba(0, 0, 0, 0.28),
      rgba(0, 0, 0, 0.86)
    );
  }

  .detail-image {
    display: block;
    width: 100%;
    height: 250px;
    object-fit: cover;
  }

  .detail-card {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 10px;
    padding: 18px;
    background: transparent;
    border-radius: 0;
  }

  .detail-card h1,
  .detail-card h2,
  .detail-card .event-title {
    margin: 0;
    max-width: 92%;
    font-size: 28px;
    line-height: 1.05;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--text);
    text-shadow: 0 4px 8px rgba(0, 0, 0, 0.45);
  }

  .detail-date {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
    line-height: 1.35;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.78);
  }

  .detail-date::before {
    content: "";
    width: 8px;
    height: 8px;
    flex: 0 0 8px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.82);
  }

  .detail-price {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    gap: 7px;
    font-size: 13px;
    font-weight: 800;
    color: rgba(255, 255, 255, 0.72);
  }

  .ticket-button {
    width: 100%;
    margin-top: 12px;
    padding: 15px 16px;
    border: 0;
    border-radius: 18px;
    cursor: pointer;
    color: white;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: -0.2px;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    box-shadow: 0 12px 26px rgba(91, 60, 255, 0.32);
    transition: transform 0.18s ease, opacity 0.18s ease;
  }

  .ticket-button:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .ticket-button:active {
    transform: scale(0.98);
  }

  .guestlist {
    margin-top: 20px;
    padding: 18px;
    border-radius: 24px;
    background: var(--card);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .guestlist h3 {
    margin: 0 0 16px;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.2px;
  }

  .guest-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .guest-row:last-child {
    margin-bottom: 0;
  }

  .guest-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255, 255, 255, 0.12);
  }

  .guest-name {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.88);
  }

  @media (max-width: 520px) {
    #event-detail {
      padding: 16px;
    }

    .detail-container,
    .detail-image {
      min-height: 250px;
    }

    .detail-card h1,
    .detail-card h2,
    .detail-card .event-title {
      font-size: 27px;
    }
  }
</style>

</head>

<body>

  <div id="event-detail"></div>

  <script type="module" src="assets/eventsDetail.js"></script>

</body>

</html>
