<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Event Details | Backstage</title>

  <style>
    :root {
      --bg: #050507;
      --bg2: #0a0712;
      --text: rgba(255, 255, 255, 0.98);
      --muted: rgba(255, 255, 255, 0.78);
      --soft: rgba(255, 255, 255, 0.10);
      --border: rgba(255, 255, 255, 0.12);
      --purple: #8b5cf6;
      --blue: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: white;
      background:
        radial-gradient(650px 420px at 12% 0%, rgba(139, 92, 246, 0.24), transparent 65%),
        radial-gradient(700px 460px at 100% 12%, rgba(37, 99, 235, 0.18), transparent 62%),
        linear-gradient(180deg, #070709 0%, #050507 100%);
    }

    #event-detail {
      width: 100%;
      min-height: 100vh;
      padding: 28px 18px 40px;
    }

    .detail-shell {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    .detail-container {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 520px;
      border-radius: 36px;
      background: #111;
      border: 1px solid var(--border);
      box-shadow:
        0 30px 70px rgba(0, 0, 0, 0.42),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
    }

    .detail-container::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.03) 0%,
          rgba(0, 0, 0, 0.10) 34%,
          rgba(0, 0, 0, 0.82) 100%
        ),
        linear-gradient(
          to right,
          rgba(0, 0, 0, 0.18),
          rgba(0, 0, 0, 0.02)
        );
    }

    .detail-image {
      display: block;
      width: 100%;
      height: 520px;
      object-fit: cover;
    }

    .detail-image-fallback {
      width: 100%;
      height: 520px;
      background:
        radial-gradient(circle at 22% 18%, rgba(139, 92, 246, 0.55), transparent 28%),
        radial-gradient(circle at 78% 20%, rgba(37, 99, 235, 0.30), transparent 22%),
        linear-gradient(135deg, #09090c 0%, #161022 45%, #09090c 100%);
    }

    .detail-date-badge {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 3;
      width: 74px;
      height: 86px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(125, 190, 245, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .detail-day {
      font-size: 36px;
      line-height: 0.95;
      font-weight: 800;
      color: white;
    }

    .detail-month {
      margin-top: 5px;
      font-size: 16px;
      font-weight: 500;
      color: white;
    }

    .detail-card {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 14px;
      padding: 32px 28px 28px;
    }

    .event-title {
      margin: 0;
      max-width: 90%;
      font-size: 52px;
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: -1.8px;
      color: var(--text);
      text-shadow: 0 8px 20px rgba(0, 0, 0, 0.48);
    }

    .detail-date,
    .detail-price {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      line-height: 1.35;
      font-weight: 650;
      color: var(--muted);
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.34);
    }

    .detail-date::before {
      content: "";
      width: 10px;
      height: 10px;
      flex: 0 0 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
    }

    .detail-price::before {
      content: "⌖";
      font-size: 18px;
      color: rgba(255, 255, 255, 0.82);
    }

    .guestlist {
      margin-top: 24px;
      padding: 22px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .guestlist h3 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 800;
      color: white;
    }

    @media (max-width: 700px) {
      #event-detail {
        padding: 18px 14px 30px;
      }

      .detail-container {
        min-height: 480px;
        border-radius: 30px;
      }

      .detail-image,
      .detail-image-fallback {
        height: 480px;
      }

      .detail-date-badge {
        top: 18px;
        left: 18px;
        width: 68px;
        height: 78px;
        border-radius: 21px;
      }

      .detail-container {
  cursor: pointer;
}

      .detail-day {
        font-size: 32px;
      }

      .detail-month {
        font-size: 15px;
      }

      .detail-card {
        padding: 24px 22px 22px;
        gap: 12px;
      }

      .event-title {
        max-width: 96%;
        font-size: 42px;
      }

      .detail-date,
      .detail-price {
        font-size: 15px;
      }
    }

    @media (max-width: 520px) {
      .detail-container {
        min-height: 440px;
      }

      .detail-image,
      .detail-image-fallback {
        height: 440px;
      }

      .event-title {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <div id="event-detail"></div>
  <script type="module" src="assets/eventsDetail.js"></script>
</body>

</html>
