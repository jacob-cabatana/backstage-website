<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Ticket | Backstage</title>
  <link rel="stylesheet" href="assets/styles.css" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 60px 16px;
      color: white;
      overflow-y: auto;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 20px 10px;
      background: transparent;
      border: none;
      backdrop-filter: none;
      box-shadow: none;
      text-align: center;
      position: relative;
      box-sizing: border-box;
    }

    h2 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .subtitle {
      margin: 10px 0 32px;
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .photo-picker {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .photo-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background:
        linear-gradient(#000, #000) padding-box,
        linear-gradient(135deg, #9c4ff2, #225cda) border-box;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    .photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      pointer-events: none;
    }

    .photo-plus {
      font-size: 36px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      position: absolute;
      pointer-events: none;
    }

    #profile-photo {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .name-row {
      display: flex;
      gap: 12px;
    }

    .form input {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
      outline: none;
      transition: 0.2s ease;
      width: 100%;
      box-sizing: border-box;
    }

    .form input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .form input:focus {
      border-color: #9c4ff2;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 0 2px rgba(156,79,242,0.35);
    }

    #claim-free-button {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      border-radius: 18px;
      border: 2px solid transparent;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      color: white;

      background:
        linear-gradient(#000, #000) padding-box,
        linear-gradient(90deg, #9c4ff2, #225cda) border-box;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-sizing: border-box;
    }

    #claim-free-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #claim-free-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(156,79,242,0.35);
    }

    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    #claim-free-button.loading .btn-spinner {
      display: inline-block;
    }

    #claim-free-button.loading .btn-text {
      opacity: 0.7;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .ticket-result {
      display: none;
      margin-top: 28px;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-icon {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      margin: 0 auto 18px;
      background:
        linear-gradient(#000, #000) padding-box,
        linear-gradient(135deg, #9c4ff2, #225cda) border-box;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
    }


    .ticket-ready-subtitle {
      margin: 8px auto 22px;
      max-width: 300px;
      color: rgba(255,255,255,0.64);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.45;
    }

.qr-card {
  width: 100%;
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0;
  box-shadow: none;
  box-sizing: border-box;
}

    .qr-frame {
      background: #ffffff;
      border-radius: 24px;
      padding: 14px;
      width: fit-content;
      margin: 0 auto;
    }

    .qr-image {
      display: block;
      width: 240px;
      height: 240px;
      border-radius: 14px;
    }

    .ticket-meta {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .ticket-name {
      font-size: 15px;
      font-weight: 800;
      color: white;
    }


    .app-store-button {
      margin-top: 12px;
      width: 100%;
      padding: 14px 0;
      border-radius: 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      color: white;
      background: linear-gradient(90deg, #9c4ff2, #225cda);
      transition: 0.2s ease;
      display: block;
      box-sizing: border-box;
    }

    .app-store-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(156,79,242,0.45);
    }

    .app-sheet-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: blur(14px);
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 16px;
  box-sizing: border-box;
}

.app-sheet-overlay.show {
  display: flex;
}

.app-sheet-overlay.hidden {
  display: none;
}

.app-sheet {
  width: 100%;
  max-width: 420px;
  padding: 42px 22px 22px;
  border-radius: 28px;
  background: #111;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 24px 80px rgba(0,0,0,0.65);
  text-align: center;
  position: relative;
  animation: sheetUp 0.28s ease both;
}

@keyframes sheetUp {
  from {
    opacity: 0;
    transform: translateY(24px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.app-sheet-close {
  position: absolute;
  top: 14px;
  right: 16px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 24px;
  line-height: 34px;
  cursor: pointer;
}

.app-sheet h2 {
  margin: 8px 0 10px;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.4px;
}

.app-sheet p {
  margin: 0 auto 22px;
  max-width: 310px;
  color: rgba(255,255,255,0.68);
  font-size: 14px;
  font-weight: 600;
  line-height: 1.45;
}

.app-sheet-button {
  width: 100%;
  padding: 15px 0;
  border-radius: 16px;
  border: none;
  background: linear-gradient(90deg, #9c4ff2, #225cda);
  color: white;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
}

.app-sheet-link {
  margin-top: 12px;
  width: 100%;
  padding: 12px 0;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.68);
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
}

.app-sheet-close {
  position: absolute;
  top: 14px;
  right: 16px;

  width: 34px !important;
  height: 34px !important;
  padding: 0 !important;

  border-radius: 50% !important;
  border: none !important;

  background: rgba(255,255,255,0.10) !important;
  color: white !important;

  font-size: 22px !important;
  font-weight: 700;
  line-height: 34px;
  text-align: center;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  box-shadow: none !important;
  transform: none !important;
}

    @media (max-width: 420px) {
      body {
        padding: 40px 16px;
      }

      .name-row {
        gap: 10px;
      }

      .qr-image {
        width: 220px;
        height: 220px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">

      <div id="appSheetOverlay" class="app-sheet-overlay">
  <div class="app-sheet">
    <button class="app-sheet-close" onclick="closeAppSheet()" aria-label="Close">
      ×
    </button>

    <h2>Download BCKSTGE</h2>

    <p>
      Your ticket is ready. Download BCKSTGE to save it in the app and see who’s going.
    </p>

    <button class="app-sheet-button" onclick="openBackstageApp()">
      Get BCKSTGE
    </button>

    <button class="app-sheet-link" onclick="closeAppSheet()">
      Continue on web
    </button>
  </div>
</div>

      <div id="form-section">
        <h2>Claim Your Free Ticket</h2>
        <p class="subtitle">Enter your details to receive your QR ticket</p>

        <div class="form">
          <div class="photo-picker">
            <label class="photo-circle">
              <img id="profile-preview" />
              <div class="photo-plus">+</div>

              <input
                id="profile-photo"
                type="file"
                accept="image/*"
                required
              />
            </label>
          </div>

          <div class="name-row">
            <input id="first-name" type="text" placeholder="First Name" />
            <input id="last-name" type="text" placeholder="Last Name" />
          </div>

          <input id="email" type="email" placeholder="Email Address" />

          <input
            id="phone"
            type="tel"
            placeholder="Phone Number"
            inputmode="tel"
            autocomplete="tel"
          />
        </div>

        <button id="claim-free-button" disabled>
          <span class="btn-text">Get Free Ticket</span>
          <span class="btn-spinner"></span>
        </button>
      </div>

      <div class="ticket-result" id="ticket-result">
        <div class="success-icon">✓</div>

  

        <div class="qr-card">
          <div class="qr-frame">
            <img id="ticket-qr" class="qr-image" alt="Ticket QR Code" />
          </div>

<div class="ticket-meta">
  <div class="ticket-name" id="ticket-name">Your Ticket</div>
</div>

          <a
            href="https://apps.apple.com/us/app/backstage-events/id6751863780"
            target="_blank"
            rel="noopener"
            class="app-store-button"
          >
            Download Backstage
          </a>

    
        </div>
      </div>

    </div>
  </div>
  

 <script>
  function showAppSheet() {
    const sheet = document.getElementById("appSheetOverlay");
    if (!sheet) return;

    sheet.classList.remove("hidden");
    sheet.classList.add("show");
  }

  function closeAppSheet() {
    const sheet = document.getElementById("appSheetOverlay");
    if (!sheet) return;

    sheet.classList.remove("show");
    sheet.classList.add("hidden");
  }

  function openBackstageApp() {
    window.location.href = "https://apps.apple.com/us/app/backstage-events/id6751863780";
  }
</script>

<script type="module" src="assets/free-ticket-info.js"></script>
</body>
</html>
