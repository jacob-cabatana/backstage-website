<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Checkout | Backstage</title>
  <link rel="stylesheet" href="assets/styles.css" />

  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --surface-2: #171717;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --muted-2: rgba(255, 255, 255, 0.48);
      --border: rgba(255, 255, 255, 0.10);
      --line: rgba(255, 255, 255, 0.08);
      --button: #f5f5f7;
      --button-text: #000000;
      --accent: #a855f7;
      --accent-2: #3b82f6;
      --male: #3b82f6;
      --female: #ec4899;
      --danger: #ff5f57;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      display: none;
    }

    body {
      overflow-x: hidden;
      background: #000;
    }

    .checkout-shell {
      width: 100%;
      max-width: 760px;
      min-height: 100vh;
      margin: 0 auto;
      background: #000;
      padding: 20px 0 calc(132px + env(safe-area-inset-bottom));
    }

    .checkout-hero {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      max-height: 540px;
      margin: 0;
      background: #000;
      border-radius: 28px;
      overflow: hidden;
      isolation: isolate;
    }

    .checkout-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.18) 58%, rgba(0,0,0,0.72) 100%);
    }

    .checkout-image,
    .checkout-image-fallback {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      border-radius: 28px;
    }

    .checkout-image-fallback {
      min-height: 260px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10), transparent 30%),
        linear-gradient(135deg, #090909 0%, #161616 50%, #0a0a0a 100%);
    }

    .top-nav {
      position: absolute;
      top: calc(14px + env(safe-area-inset-top));
      left: 16px;
      right: 16px;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .back-button,
    .brand-pill {
      min-height: 38px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.50);
      color: #fff;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.26);
      pointer-events: auto;
    }

    .back-button {
      width: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 25px;
      line-height: 1;
      font-weight: 350;
    }

    .brand-pill {
      padding: 0 13px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.86);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 0.01em;
    }

    .checkout-main {
      padding: 26px 24px 0;
    }

    .event-title {
      margin: 0;
      color: #ffffff;
      font-size: clamp(30px, 6.8vw, 46px);
      line-height: 0.98;
      font-weight: 650;
      letter-spacing: -0.055em;
    }

    .event-date-line {
      margin: 10px 0 0;
      color: var(--event-accent-color, #a855f7);
      font-size: 16px;
      line-height: 1.35;
      font-weight: 600;
    }

    .quick-info {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin: 14px 0 30px;
    }

    .info-line {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 14px;
      line-height: 1.3;
      font-weight: 500;
    }

    .section {
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    .section:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .section-topline {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
    }

    .section-title {
      margin: 0;
      color: #fff;
      font-size: 21px;
      font-weight: 500;
      letter-spacing: -0.03em;
    }

    .section-caption {
      margin: 0;
      color: var(--muted-2);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 500;
    }

    .ticket-list {
      display: grid;
      gap: 12px;
    }

.ticket-row {
  min-height: 72px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.22);
  background: transparent;
}


    .ticket-row.is-selected {
      border-color: color-mix(in srgb, var(--ticket-color, #a855f7) 58%, rgba(255,255,255,0.10));
      box-shadow: 0 0 22px color-mix(in srgb, var(--ticket-color, #a855f7) 20%, transparent);
    }

    .ticket-row.is-sold-out {
      opacity: 0.45;
      filter: grayscale(70%);
    }

    .ticket-row[data-ticket-gender="men"] {
      --ticket-color: var(--male);
    }

    .ticket-row[data-ticket-gender="women"] {
      --ticket-color: var(--female);
    }

.ticket-copy {
  min-width: 0;
  padding-left: 0;
}
.ticket-name-line {
  display: block;
}

    .ticket-name {
      margin: 0;
      color: #fff;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 650;
      letter-spacing: -0.025em;
    }


.ticket-subtext,
.ticket-timer,
.free-disclaimer {
  margin: 4px 0 0;
  color: var(--muted-2);
  font-size: 12px;
  line-height: 1.25;
  font-weight: 500;
}

    .ticket-timer {
      color: rgba(255,255,255,0.58);
    }

    .free-disclaimer {
      color: rgba(255, 95, 87, 0.86);
      font-weight: 650;
    }

.ticket-action {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  min-width: 214px;
}

    .claim-button {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1.5px solid transparent;
      background:
        linear-gradient(#000, #000) padding-box,
        linear-gradient(135deg, var(--ticket-color, #a855f7) 0%, color-mix(in srgb, var(--ticket-color, #a855f7) 45%, #ffffff) 100%) border-box;
      color: #ffffff;
      font-size: 13px;
      font-weight: 750;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
      box-shadow: 0 0 18px color-mix(in srgb, var(--ticket-color, #a855f7) 22%, transparent);
      white-space: nowrap;
    }

    .claim-button:active,
    .qty-button:active,
    .checkout-button:active {
      transform: scale(0.985);
    }

.ticket-pill {
  width: 214px;
  min-height: 44px;
  display: grid;
  grid-template-columns: 1fr 82px;
  align-items: center;
  border-radius: 8px;
  overflow: hidden;
  border: 1.5px solid var(--ticket-color, #a855f7);
  background: var(--ticket-color, #a855f7);
}

.ticket-pill-label {
  min-width: 0;
  padding: 0 12px;
  color: #fff;
  font-size: 13px;
  font-weight: 800;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ticket-pill-price {
  height: 100%;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #050505;
  color: #fff;
  font-size: 18px;
  font-weight: 850;
  letter-spacing: -0.04em;
}

.ticket-pill-price small {
  margin-left: 3px;
  font-size: 11px;
  font-weight: 750;
  letter-spacing: 0;
}

.qty-control {
  margin-top: 8px;
  display: grid;
  grid-template-columns: 34px 34px 34px;
  align-items: center;
  justify-items: center;
  gap: 5px;
  padding: 5px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
}

    .qty-button {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 20px;
      line-height: 1;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease;
    }

    .qty-button.plus {
      background: var(--ticket-color, #a855f7);
      color: #fff;
    }

    .qty-button.minus[disabled] {
      opacity: 0.28;
      cursor: default;
    }

    .quantity {
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      min-width: 22px;
    }

    .ticket-price {
      display: block;
      margin-top: 5px;
      color: #fff;
      font-size: 15px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .empty-state {
      margin: 0;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.045);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 500;
    }

    .checkout-bottom-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 999;
      width: 100%;
      max-width: 760px;
      transform: translateX(-50%);
      padding: 14px 24px calc(14px + env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-top: 1px solid rgba(255, 255, 255, 0.10);
      display: grid;
      grid-template-columns: 1fr 170px;
      gap: 18px;
      align-items: center;
    }

    .price-value {
      display: block;
      color: #fff;
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-caption {
      display: block;
      margin-top: 6px;
      color: var(--muted-2);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 500;
    }

    .checkout-button {
      width: 100%;
      min-height: 50px;
      border: 1.5px solid transparent;
      border-radius: 999px;
      background:
        linear-gradient(#000, #000) padding-box,
        linear-gradient(135deg, #a855f7 0%, #3b82f6 100%) border-box;
      color: #ffffff;
      font-size: 13px;
      font-weight: 750;
      letter-spacing: 0.01em;
      cursor: pointer;
      text-transform: none;
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
      box-shadow: 0 0 18px rgba(168, 85, 247, 0.22);
    }

    .checkout-button:hover {
      opacity: 1;
      box-shadow: 0 0 24px rgba(59, 130, 246, 0.28);
    }

    .checkout-button[disabled] {
      opacity: 0.48;
      cursor: default;
      box-shadow: none;
    }

    .state-card {
      width: calc(100% - 32px);
      max-width: 760px;
      margin: 28px auto;
      padding: 22px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }

    .state-card h3 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .state-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-weight: 500;
    }

    @media (max-width: 700px) {
      .checkout-shell {
        max-width: none;
        padding-top: 14px;
      }

      .checkout-hero {
        margin: 0 12px;
        aspect-ratio: 4 / 5;
        max-height: none;
        border-radius: 24px;
      }

      .checkout-image,
      .checkout-image-fallback {
        border-radius: 24px;
      }

      .checkout-main {
        padding: 22px 16px 0;
      }

      .checkout-bottom-bar {
        grid-template-columns: 1fr 156px;
        gap: 14px;
        padding-left: 16px;
        padding-right: 16px;
      }

.ticket-row {
  grid-template-columns: 1fr auto;
  gap: 10px;
}

.ticket-action {
  justify-content: flex-end;
  min-width: 188px;
  width: auto;
}

.ticket-pill {
  width: 188px;
  grid-template-columns: 1fr 74px;
}

.ticket-pill-label {
  font-size: 12px;
  padding: 0 9px;
}

.ticket-pill-price {
  font-size: 16px;
}

.claim-button,
.qty-control {
  width: 100%;
}

.location-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  color: #ffffff;
  flex: 0 0 auto;
}

.location-icon svg {
  width: 16px;
  height: 16px;
  display: block;
}

.qty-control {
  grid-template-columns: 42px 1fr 42px;
}
    }
  </style>
</head>

<body>
  <main id="checkout-root" class="checkout-shell">
    <section id="checkout-hero" class="checkout-hero" aria-label="Event preview">
      <div id="checkout-image-fallback" class="checkout-image-fallback"></div>
      <img id="checkout-hero-image" class="checkout-image" alt="" hidden />
    </section>

    <section class="checkout-main">
      <h1 id="event-title" class="event-title">Backstage tickets</h1>
      <p id="event-date" class="event-date-line">Date loading</p>

<div class="quick-info">
  <div class="info-line">
    <span class="location-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 21s-6-5.33-6-11a6 6 0 1 1 12 0c0 5.67-6 11-6 11Z"></path>
        <circle cx="12" cy="10" r="2.5"></circle>
      </svg>
    </span>
    <span id="event-location">Venue loading</span>
  </div>
</div>

      <section class="section" aria-labelledby="ticket-section-title">
        <div class="section-topline">
          <div>
            <h2 id="ticket-section-title" class="section-title">Tickets Available</h2>
            <p class="section-caption">Choose your ticket type below.</p>
          </div>
          <p id="ticket-count" class="section-caption"></p>
        </div>

        <div id="checkout-event" class="ticket-list">
          <p class="empty-state">Loading tickets...</p>
        </div>
      </section>
    </section>
  </main>

  <div class="checkout-bottom-bar">
    <div>
      <span id="bottom-total" class="price-value">$0.00</span>
      <span id="bottom-caption" class="price-caption">Select tickets</span>
    </div>

    <button id="checkout-button" class="checkout-button" disabled>Continue</button>
  </div>

<script type="module" src="assets/checkout.js?v=11"></script>
</body>

</html>
