<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Checkout | Backstage</title>
  <link rel="stylesheet" href="assets/styles.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,300&display=swap" rel="stylesheet">

  <style>
    :root {
      /* ── Aligned with index.html dark theme ── */
      --white: #1c1c1e;          /* raised surface (cards) */
      --black: #f5f5f7;          /* primary text */
      --secondary: #a1a1a6;      /* secondary text */
      --tertiary: #6e6e73;       /* muted text */
      --hairline: #2c2c2e;       /* borders / dividers */
      --hairline-light: #232325; /* faint dividers */
      --blue: #0a84ff;           /* accent */
      --blue-dark: #409cff;
      --bg: #0a0a0b;             /* page background */
      --bg-secondary: #141416;   /* alt surface */

      /* semantic aliases kept for existing markup */
      --surface: var(--white);
      --surface-2: var(--bg-secondary);
      --text: var(--black);
      --muted: var(--secondary);
      --muted-2: var(--tertiary);
      --border: var(--hairline);
      --line: var(--hairline-light);

      /* gender accents tuned to the index palette */
      --male: #0a84ff;
      --female: #c06cf0;
      --cyan: #0a84ff;           /* selected-state accent → blue */
      --danger: #ff5f57;

      /* purple → blue accent gradient from index.html */
      --accent-gradient: linear-gradient(120deg, #9c4ff2 0%, #6d6ff2 50%, #0a84ff 100%);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      display: none;
    }

    body {
      overflow-x: hidden;
      background: var(--bg);
    }

    .checkout-shell {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      margin: 0 auto;
      background: transparent;
      padding: calc(26px + env(safe-area-inset-top)) 0 calc(128px + env(safe-area-inset-bottom));
    }
.checkout-hero {
  position: relative;
  width: calc(100% - 60px);
  height: 650px;
  margin: 0 auto 26px;
  background: var(--bg-secondary);
  border-radius: 24px;
  overflow: hidden;
  isolation: isolate;
  border: 1px solid var(--hairline);
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
}

    .checkout-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0.16) 58%, rgba(0,0,0,0.66) 100%);
    }

    .checkout-image,
    .checkout-image-fallback {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      border-radius: 24px;
    }

    .checkout-image-fallback {
      min-height: 180px;
      background:
        radial-gradient(circle at 50% 0%, rgba(10,132,255,0.18) 0%, rgba(10,132,255,0) 60%),
        linear-gradient(135deg, #0e0e12 0%, #161618 50%, #0a0a0b 100%);
    }

    .top-nav {
      position: absolute;
      top: calc(14px + env(safe-area-inset-top));
      left: 16px;
      right: 16px;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .back-button,
    .brand-pill {
      min-height: 38px;
      border: 1px solid var(--hairline);
      background: rgba(10, 10, 11, 0.72);
      color: var(--black);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.3);
      pointer-events: auto;
    }

    .back-button {
      width: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 24px;
      line-height: 1;
      font-weight: 400;
    }

    .brand-pill {
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--secondary);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .checkout-main {
      padding: 0 30px;
    }

    .checkout-step-header {
      margin: 0 0 24px;
    }

    .step-title-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .step-title {
      margin: 0;
      color: var(--black);
      font-size: clamp(32px, 8vw, 40px);
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .step-label {
      flex: 0 0 auto;
      color: var(--secondary);
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.01em;
      padding-bottom: 6px;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--hairline);
    }

    .progress-fill {
      width: 25%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent-gradient);
    }

    .event-summary {
      margin: 0 0 20px;
      padding: 0 2px;
    }

    .event-title {
      margin: 0;
      color: var(--black);
      font-size: 26px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .event-date-line {
      margin: 10px 0 0;
      color: var(--event-accent-color, var(--blue));
      font-size: 15px;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .quick-info {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin: 10px 0 0;
    }

    .info-line {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--secondary);
      font-size: 13px;
      line-height: 1.3;
      font-weight: 500;
    }

    .location-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      color: var(--blue);
      flex: 0 0 auto;
    }

    .location-icon svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .section {
      margin-top: 26px;
      padding-top: 0;
      border-top: none;
    }

    .section-topline {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
    }

    .section-title {
      margin: 0;
      color: var(--black);
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .section-caption {
      margin: 4px 0 0;
      color: var(--tertiary);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 500;
    }

    .ticket-list {
      display: grid;
      gap: 22px;
    }

    .ticket-gender-group {
      display: grid;
      gap: 12px;
      margin-top: 26px;
    }

    .ticket-gender-group:first-child {
      margin-top: 0;
    }

    .ticket-gender-group[data-ticket-group="women"] { --ticket-color: var(--female); }
    .ticket-gender-group[data-ticket-group="men"] { --ticket-color: var(--male); }

    /* Small per-gender hint shown above each group */
    .gender-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 0 2px;
      margin-bottom: 2px;
    }

    .gender-header::before {
      content: "";
      align-self: center;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ticket-color, var(--secondary));
      flex: 0 0 auto;
    }

    .gender-title {
      margin: 0;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--secondary);
    }

    .gender-helper {
      margin: 0;
      color: var(--tertiary);
      font-size: 12px;
      line-height: 1;
      font-weight: 500;
    }

    .gender-count {
      display: none;
    }

    /* The non-gendered group needs no hint */
    .ticket-gender-group[data-ticket-group="everyone"] .gender-header {
      display: none;
    }

    .gender-options {
      display: grid;
      gap: 12px;
    }

    .ticket-row {
      position: relative;
      min-height: auto;
      display: block;
      padding: 22px 26px;
      border-radius: 20px;
      border: 1px solid var(--hairline);
      background: var(--white);
      overflow: hidden;
      transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .ticket-row::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 100% 0%, color-mix(in srgb, var(--ticket-color, var(--blue)) 12%, transparent), transparent 42%);
      opacity: 0.9;
    }

    .ticket-row > * {
      position: relative;
      z-index: 1;
    }

    .ticket-row:hover {
      transform: translateY(-1px);
      border-color: #3a3a3d;
    }

    .ticket-row.is-selected {
      border-color: var(--blue);
      background: #18181b;
      box-shadow: 0 0 0 1px rgba(10, 132, 255, 0.35), 0 20px 48px rgba(10, 132, 255, 0.12);
    }

    .ticket-row.is-sold-out {
      opacity: 0.42;
      filter: grayscale(70%);
    }

    .ticket-row[data-ticket-gender="male"],
    .ticket-row[data-ticket-gender="men"] {
      --ticket-color: var(--male);
    }

    .ticket-row[data-ticket-gender="female"],
    .ticket-row[data-ticket-gender="women"] {
      --ticket-color: var(--female);
    }

    .ticket-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    .ticket-copy {
      min-width: 0;
      flex: 1 1 auto;
    }

    .ticket-name-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .ticket-name {
      margin: 0;
      color: var(--black);
      font-size: 19px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .ticket-volume-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(10, 132, 255, 0.16);
      color: var(--blue);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .ticket-price-label {
      flex: 0 0 auto;
      color: var(--black);
      font-size: 20px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      white-space: nowrap;
      text-align: right;
    }

    .ticket-price-label small {
      margin-left: 3px;
      color: var(--secondary);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .ticket-subtitle,
    .ticket-subtext,
    .ticket-timer,
    .free-disclaimer {
      margin: 9px 0 0;
      color: var(--secondary);
      font-size: 14px;
      line-height: 1.35;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .ticket-subtext,
    .ticket-timer,
    .free-disclaimer {
      margin-top: 8px;
      color: var(--tertiary);
      font-size: 13px;
    }

    .free-disclaimer {
      color: rgba(255, 95, 87, 0.85);
    }

    .ticket-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .ticket-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--bg-secondary);
      color: var(--secondary);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
      border: 1px solid var(--hairline);
    }

    .ticket-badge.popular {
      background: var(--accent-gradient);
      color: #fff;
      border-color: transparent;
    }

    .ticket-badge.gender {
      background: color-mix(in srgb, var(--ticket-color, var(--blue)) 20%, var(--bg-secondary));
      color: #fff;
      border-color: transparent;
    }

    .qty-control {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      align-items: center;
      justify-items: center;
      gap: 16px;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
    }

    .qty-button {
      width: 52px;
      height: 52px;
      border: 1px solid var(--hairline);
      border-radius: 50%;
      background: var(--bg-secondary);
      color: var(--black);
      font-size: 28px;
      line-height: 1;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .qty-button.plus {
      background: var(--blue);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 8px 24px rgba(10, 132, 255, 0.3);
    }

    .qty-button.plus:hover {
      background: var(--blue-dark);
    }

    .qty-button.minus[disabled] {
      opacity: 0.26;
      cursor: default;
    }

    .quantity-wrap {
      display: grid;
      place-items: center;
      gap: 2px;
    }

    .quantity {
      color: var(--black);
      font-size: 36px;
      line-height: 0.9;
      font-weight: 700;
      text-align: center;
      min-width: 38px;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }

    .quantity-label {
      color: var(--tertiary);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 600;
      text-align: center;
    }

    .free-claim-button {
      min-height: 42px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(10, 132, 255, 0.28);
      white-space: nowrap;
      transition: background 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
    }

    .free-claim-button:hover {
      background: var(--blue-dark);
    }

    .free-claim-button[disabled] {
      opacity: 0.44;
      cursor: default;
      box-shadow: none;
    }

    .claim-button:active,
    .free-claim-button:active,
    .qty-button:active,
    .checkout-button:active {
      transform: scale(0.985);
    }

    .empty-state {
      margin: 0;
      padding: 18px;
      border-radius: 16px;
      border: 1px solid var(--hairline);
      background: var(--white);
      color: var(--secondary);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 400;
    }

    .checkout-bottom-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 999;
      width: 100%;
      max-width: 520px;
      transform: translateX(-50%);
      padding: 14px 30px calc(14px + env(safe-area-inset-bottom));
      background: rgba(10, 10, 11, 0.82);
      backdrop-filter: saturate(180%) blur(22px);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
      border-top: 1px solid var(--hairline);
      display: grid;
      grid-template-columns: 1fr 156px;
      gap: 16px;
      align-items: center;
    }

    .price-value {
      display: block;
      color: var(--black);
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }

    .price-caption {
      display: block;
      margin-top: 6px;
      color: var(--tertiary);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 500;
    }

    .checkout-button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 980px;
      background: var(--blue);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.015em;
      cursor: pointer;
      text-transform: none;
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      box-shadow: 0 0 0 rgba(10, 132, 255, 0);
    }

    .checkout-button:hover {
      background: var(--blue-dark);
      transform: scale(1.01);
      box-shadow: 0 8px 30px rgba(10, 132, 255, 0.35);
    }

    .checkout-button[disabled] {
      opacity: 0.4;
      cursor: default;
      box-shadow: none;
      transform: none;
      background: var(--blue);
    }

    .state-card {
      width: calc(100% - 32px);
      max-width: 520px;
      margin: 28px auto;
      padding: 24px;
      border-radius: 20px;
      background: var(--white);
      border: 1px solid var(--hairline);
    }

    .state-card h3 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--black);
    }

    .state-card p {
      margin: 0;
      color: var(--secondary);
      line-height: 1.5;
      font-weight: 400;
    }

    @media (max-width: 560px) {
      .checkout-shell {
        max-width: none;
        padding-top: calc(18px + env(safe-area-inset-top));
      }

      .checkout-hero {
        width: calc(100% - 60px);
        margin-bottom: 24px;
      }

      .checkout-main {
        padding-left: 30px;
        padding-right: 30px;
      }

      .ticket-row {
        padding: 20px 24px;
      }

      .ticket-name {
        font-size: 18px;
      }

      .ticket-price-label {
        font-size: 19px;
      }
    }

    @media (max-width: 390px) {
      .checkout-main {
        padding-left: 20px;
        padding-right: 20px;
      }

      .checkout-hero {
        width: calc(100% - 40px);
      }

      .step-title {
        font-size: 30px;
      }

      .step-label {
        font-size: 13px;
      }

      .ticket-card-top {
        gap: 10px;
      }

      .ticket-price-label {
        font-size: 17px;
      }

      .qty-control {
        grid-template-columns: 48px 1fr 48px;
      }

      .qty-button {
        width: 48px;
        height: 48px;
      }

      .checkout-bottom-bar {
        grid-template-columns: 1fr 140px;
        padding-left: 20px;
        padding-right: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }

    /* ── Layout cleanups ── */
    .section-topline {
      display: none;
    }

    /* The per-gender hint above each group carries the context,
       so the noisy per-ticket labels are hidden. */
    .ticket-volume-badge,
    .ticket-subtitle,
    .ticket-subtext,
    .ticket-badges {
      display: none;
    }
  </style>
</head>

<body>
  <main id="checkout-root" class="checkout-shell">
    <section id="checkout-hero" class="checkout-hero" aria-label="Event preview">
      <div id="checkout-image-fallback" class="checkout-image-fallback"></div>
      <img id="checkout-hero-image" class="checkout-image" alt="" hidden />
    </section>

    <section class="checkout-main">
      <div class="checkout-step-header" aria-label="Checkout progress">
        <div class="step-title-row">
          <h1 class="step-title">Pick your tickets</h1>
          <span class="step-label">Step 1 of 4</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill"></div>
        </div>
      </div>

      <section class="event-summary" aria-label="Event details">
        <h2 id="event-title" class="event-title">Backstage tickets</h2>
        <p id="event-date" class="event-date-line">Date loading</p>

        <div class="quick-info">
          <div class="info-line">
            <span class="location-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 21s-6-5.33-6-11a6 6 0 1 1 12 0c0 5.67-6 11-6 11Z"></path>
                <circle cx="12" cy="10" r="2.5"></circle>
              </svg>
            </span>
            <span id="event-location">Venue loading</span>
          </div>
        </div>
      </section>

      <section class="section" aria-labelledby="ticket-section-title">
        <div class="section-topline">
          <div>
            <h2 id="ticket-section-title" class="section-title">Tickets Available</h2>
            <p class="section-caption">Choose Men or Women, then pick a ticket.</p>
          </div>
          <p id="ticket-count" class="section-caption"></p>
        </div>

        <div id="checkout-event" class="ticket-list">
          <p class="empty-state">Loading tickets...</p>
        </div>
      </section>
    </section>
  </main>

  <div class="checkout-bottom-bar">
    <div>
      <span id="bottom-total" class="price-value">$0.00</span>
      <span id="bottom-caption" class="price-caption">Select tickets</span>
    </div>

    <button id="checkout-button" class="checkout-button" disabled>Continue</button>
  </div>
