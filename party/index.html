<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Backstage Event</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Backstage Event" />
  <meta property="og:description" content="View this event on Backstage." />
  <meta property="og:image" content="https://backstageaccess.app/assets/EventShare.png" />
  <meta property="og:image:secure_url" content="https://backstageaccess.app/assets/EventShare.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://backstageaccess.app/party/index.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Backstage Event" />
  <meta name="twitter:description" content="View this event on Backstage." />
  <meta name="twitter:image" content="https://backstageaccess.app/assets/EventShare.png" />

  <style>
    :root {
      --bg: #050505;
      --card: rgba(255,255,255,.065);
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.94);
      --muted: rgba(255,255,255,.66);
      --accent: #9C4FF2;
      --accent2: #225CDA;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(156,79,242,.34), transparent 34%),
        radial-gradient(circle at bottom left, rgba(34,92,218,.30), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .wrap {
      width: min(470px, 100%);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 26px;
      box-shadow: 0 30px 90px rgba(0,0,0,.46);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .preview {
      width: 100%;
      border-radius: 22px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 22px 60px rgba(34,92,218,.28);
      display: block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: -.6px;
      text-align: center;
    }

    p {
      margin: 0 0 16px;
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
    }

    .pill {
      margin: 12px auto 0;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: rgba(255,255,255,.78);
      font-size: 13px;
    }

    .btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    button,
    a.btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 18px;
      padding: 15px 14px;
      font-weight: 800;
      font-size: 15px;
      border: 1px solid rgba(255,255,255,.14);
      transition: transform .08s ease, opacity .08s ease;
      user-select: none;
      cursor: pointer;
      width: 100%;
    }

    button:active,
    a.btn:active {
      transform: scale(.99);
      opacity: .9;
    }

    .primary {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 18px 45px rgba(111,30,255,.25);
    }

    .secondary {
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.90);
    }

    .tiny {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,.55);
      text-align: center;
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <img class="preview" src="/assets/EventShare.png" alt="Backstage Event" />

      <h1>Open this event on Backstage</h1>

      <p>View tickets, details, and event access for this event.</p>

      <div id="partyPill" class="pill" style="display:none;"></div>

      <div class="btns">
    <button class="primary" onclick="openParty()">
  Open in BCKSTGE
</button>

        <a class="btn secondary"
           href="https://apps.apple.com/us/app/backstage-events/id6751863780">
          Download on the App Store
        </a>
      </div>

      <div id="fallbackText" class="tiny"></div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    let partyId = params.get("id") || "";

    if (!partyId) {
      const redirectedPath = params.get("path");
      const path = redirectedPath || window.location.pathname;

      const parts = path
        .split("/")
        .map(part => part.trim())
        .filter(Boolean);

      partyId =
        parts.length >= 2 && parts[0] === "party" ? parts[1] : "";
    }

    const pill = document.getElementById("partyPill");
    const fallbackText = document.getElementById("fallbackText");

    if (partyId && pill) {
      pill.style.display = "block";
      pill.textContent = "Opening party...";
    }

    function openParty() {
      if (!partyId) {
        fallbackText.textContent = "This event link is missing an event ID.";
        return;
      }

      window.location.href = `backstage://party/${encodeURIComponent(partyId)}`;

      setTimeout(() => {
        fallbackText.textContent =
          "If Backstage did not open, make sure the app is installed.";
      }, 900);
    }

  </script>
</body>
</html>
